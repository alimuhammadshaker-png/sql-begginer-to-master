<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnSQL Practice</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --panel: #ffffff;
      --border: #dde2ea;
      --text: #22293a;
      --accent: #3a6df0;
      --accent-dark: #2a52c0;
      --good: #1c9c5b;
      --bad: #d1483e;
      --editor-bg: #1e2130;
      --editor-text: #e6e9f2;
      --editor-border: #333752;
      --learn-bg: #f8f9fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ─── HEADER ─── */
    header {
      background: linear-gradient(135deg, #2a52c0, #3a6df0);
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    header .left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    header .nav-links {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    header .nav-links a {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.85;
      padding: 4px 12px;
      border-radius: 20px;
      transition: opacity 0.2s, background 0.2s;
    }

    header .nav-links a:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.15);
    }

    header .nav-links a.active {
      opacity: 1;
      background: rgba(255, 255, 255, 0.2);
    }

    header .tag {
      font-size: 13px;
      opacity: .85;
    }

    #progressTag {
      font-size: 13px;
      opacity: .9;
      background: rgba(255, 255, 255, 0.15);
      padding: 4px 14px;
      border-radius: 20px;
    }

    /* ─── LAYOUT ─── */
    .layout {
      display: flex;
      min-height: calc(100vh - 70px);
    }

    /* ─── SIDEBAR ─── */
    aside {
      width: 280px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 10px;
      flex-shrink: 0;
    }

    aside h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #8891a5;
      margin: 14px 6px 6px;
    }

    .cat-group summary {
      cursor: pointer;
      font-weight: 600;
      padding: 8px 6px;
      border-radius: 6px;
      font-size: 14px;
    }

    .cat-group summary:hover {
      background: #eef1f7;
    }

    .cat-group ul {
      list-style: none;
      margin: 0;
      padding: 0 0 6px 10px;
    }

    .cat-group li button {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 6px 8px;
      font-size: 13px;
      border-radius: 5px;
      cursor: pointer;
      color: #3a4256;
      transition: background 0.15s;
    }

    .cat-group li button:hover {
      background: #eef1f7;
    }

    .cat-group li button.active {
      background: var(--accent);
      color: #fff;
    }

    /* ─── MAIN CONTENT ─── */
    main {
      flex: 1;
      padding: 20px 28px;
      overflow-y: auto;
      min-width: 0;
    }

    /* ─── HYBRID LAYOUT: Learn + Practice ─── */
       /* Learn panel now uses full width - no grid needed */
       /* Learn panel and dataset panel now use full width */
    #learnPanel {
      margin-bottom: 20px;
    }
    
    #datasetPanel {
      margin-bottom: 20px;
    }
    #learnPanel h3 {
      font-size: 15px;
      margin: 0 0 4px 0;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #learnPanel .learn-topic {
      font-size: 20px;
      font-weight: 700;
      margin: 4px 0 10px 0;
      color: var(--text);
    }

    #learnPanel .learn-section {
      margin-bottom: 14px;
    }

    #learnPanel .learn-section h4 {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 4px 0;
      color: #3a4256;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    #learnPanel .learn-section p,
    #learnPanel .learn-section li {
      font-size: 14px;
      line-height: 1.6;
      color: #3a4256;
      margin: 0 0 6px 0;
    }

    #learnPanel .learn-section ul {
      padding-left: 20px;
      margin: 4px 0 8px 0;
    }

    #learnPanel .learn-section code {
      background: #eef1f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Consolas', monospace;
      color: #2a52c0;
    }

    #learnPanel .learn-example {
      background: var(--editor-bg);
      color: var(--editor-text);
      padding: 10px 14px;
      border-radius: 6px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: auto;
      margin: 6px 0;
      border: 1px solid var(--editor-border);
    }

    #learnPanel .learn-example .comment {
      color: #6a7a8a;
    }

    #learnPanel .learn-example .keyword {
      color: #ff79c6;
    }

    #learnPanel .learn-example .string {
      color: #f1fa8c;
    }

    #learnPanel .learn-example .func {
      color: #50fa7b;
    }

    #learnPanel .learn-example .table {
      color: #8be9fd;
    }

    #learnPanel .learn-output {
      background: #f8f9fc;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'Consolas', monospace;
      font-size: 13px;
      color: var(--text);
      overflow-x: auto;
      margin: 6px 0;
    }

    .learn-toggle {
      display: none;
    }

    /* ─── DATASET PANEL ─── */
    #datasetPanel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .tabs button {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #f0f2f7;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #495066;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .tabs button:hover {
      background: #e4e8f0;
    }

    .tabs button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }

    table th,
    table td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }

    table th {
      background: #eef1f7;
      font-weight: 600;
    }

    .table-wrap {
      max-height: 230px;
      overflow: auto;
      border-radius: 6px;
    }

    /* ─── EXERCISE PANEL ─── */
    #exercisePanel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
    }

    #exMeta {
      font-size: 12px;
      color: #8891a5;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 6px;
    }

    #exTitle {
      margin: 0 0 8px;
      font-size: 20px;
    }

    #exQuestion {
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 14px;
      color: #333a4d;
    }

    textarea#sqlInput {
      width: 100%;
      min-height: 120px;
      background: var(--editor-bg);
      color: var(--editor-text);
      border: 1px solid var(--editor-border);
      border-radius: 8px;
      padding: 14px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      resize: vertical;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    textarea#sqlInput:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btnrow {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .btnrow button {
      padding: 9px 16px;
      border-radius: 7px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btnrow button:active {
      transform: scale(0.97);
    }

    #runBtn {
      background: var(--accent);
      color: #fff;
    }

    #runBtn:hover {
      background: var(--accent-dark);
    }

    #hintBtn {
      background: #fff3cd;
      color: #8a6100;
      border: 1px solid #f0dca0;
    }

    #hintBtn:hover {
      background: #f0e0b0;
    }

    #prevBtn,
    #nextBtn {
      background: #eef1f7;
      color: #333a4d;
      border: 1px solid var(--border);
    }

    #prevBtn:hover,
    #nextBtn:hover {
      background: #e4e8f0;
    }

    #hintBox {
      margin-top: 14px;
      background: #fff9e8;
      border: 1px solid #f0dca0;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13.5px;
      color: #6b5300;
    }

    #hintBox.hidden {
      display: none;
    }

    #resultBox {
      margin-top: 18px;
    }

    #resultBox .status {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .status.good {
      color: var(--good);
    }

    .status.bad {
      color: var(--bad);
    }

    footer.progress {
      margin-top: 10px;
      font-size: 12px;
      color: #8891a5;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar {
      width: 9px;
      height: 9px;
    }

    ::-webkit-scrollbar-thumb {
      background: #c7cede;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-track {
      background: #f4f6f9;
    }

    /* ─── RESPONSIVE ─── */
       @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: stretch;
        padding: 12px 16px;
      }

      header .left {
        flex-direction: column;
        align-items: stretch;
        gap: 0.5rem;
      }

      header .nav-links {
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      header .nav-links a {
        font-size: 13px;
        padding: 4px 10px;
      }

      #progressTag {
        align-self: flex-start;
      }

      main {
        padding: 12px 14px;
      }

      aside {
        width: 200px;
      }

      #learnPanel {
        max-height: 400px;
        overflow-y: auto;
      }

      #learnPanel #learnContent {
        padding: 14px !important;
      }

      #exercisePanel {
        padding: 16px;
      }

      textarea#sqlInput {
        min-height: 90px;
        font-size: 13px;
      }
    }

        @media (max-width: 480px) {
      aside {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 300px;
      }

      .layout {
        flex-direction: column;
      }

      #learnPanel {
        max-height: 300px;
        overflow-y: auto;
      }

      #learnPanel #learnContent {
        padding: 12px !important;
      }
    }
  </style>
</head>

    (function() {

        ["inventory", "warehouse", "=", "W1", "eq"]
      ];
      specs.forEach(([ds, col, op, val, tag]) => {
        const readable = typeof val === "string" ? `'${val}'` : val;
        add("WHERE Filtering",
          `Write a query to select all rows from ${ds} where ${col} ${op} ${readable}.`,
          `Use WHERE ${col} ${op} ${readable} after your FROM clause.`,
          ["select", "from", ds, "where", col],

          () => datasets[ds].filter(r => {
            if (tag === "gt") return r[col] > val;
            if (tag === "lt") return r[col] < val;
            if (tag === "gte") return r[col] >= val;
            if (tag === "lte") return r[col] <= val;

      specs.forEach(([ds, fn, col, alias]) => {

          `Write a query to find the ${fn}${col === "*" ? " of all rows" : (" of " + col)} in the ${ds} table.`,

          ["select", fn.toLowerCase(), "from", ds],
          ds,
          () => {

            if (fn === "COUNT") val = rows.length;
            else if (fn === "AVG") val = round2(rows.reduce((s, r) => s + r[col], 0) / rows.length);

            else if (fn === "SUM") val = round2(rows.reduce((s, r) => s + r[col], 0));

        function renderDatasetTabs() {
      const tabs = document.getElementById('datasetTabs');
      if (!tabs) {
        console.error('datasetTabs not found!');
        return;
      }
      
      tabs.innerHTML = '';
      Object.keys(datasets).forEach((name, i) => {
        const btn = document.createElement('button');
        btn.textContent = name.charAt(0).toUpperCase() + name.slice(1);
        btn.dataset.name = name;
        if (i === 0) btn.classList.add('active');
        btn.onclick = () => showDataset(name, btn);
        tabs.appendChild(btn);
      });
      showDataset(Object.keys(datasets)[0]);
    }

    function renderTable(rows) {
      if (!rows || rows.length === 0) return '<p style="padding:10px;color:#8891a5;">(no rows)</p>';
      const cols = Object.keys(rows[0]);
      let html = '<table><thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
      rows.forEach(r => {
        html += '<tr>' + cols.map(c => `<td>${r[c] === null || r[c] === undefined ? '<em>NULL</em>' : r[c]}</td>`)
          .join('') + '</tr>';
      });
      html += '</tbody></table>';
      return html;
    }

       function showDataset(name, btnEl) {
      const tableWrap = document.getElementById('datasetTableWrap');
      if (!tableWrap) {
        console.error('datasetTableWrap not found!');
        return;
      }
      
      document.querySelectorAll('#datasetTabs button').forEach(b => b.classList.remove('active'));
      if (btnEl) btnEl.classList.add('active');
      else document.querySelector(`#datasetTabs button[data-name="${name}"]`)?.classList.add('active');
      
      tableWrap.innerHTML = renderTable(datasets[name]);
    }

     function updateLearnPanel(category) {
      // Debug: log what category we're trying to find
      console.log('Looking for learn content for category:', category);
      
      // Direct lookup with exact match
      let learn = learnContent[category];
      
      // If not found, try to find a close match
      if (!learn) {
        // Try trimming or removing special characters
        const cleanCategory = category.replace(/[\(\)]/g, '').trim();
        if (learnContent[cleanCategory]) {
          learn = learnContent[cleanCategory];
        }
      }
      
      // If we found content, display it
      if (learn) {
        document.getElementById('learnTopic').textContent = learn.topic;
        document.getElementById('learnBody').innerHTML = learn.body;
        console.log('✅ Found learn content for:', category);
      } else {
        // Fallback: show generic content with the category name
        console.warn('⚠️ No learn content found for:', category);
        document.getElementById('learnTopic').textContent = category || 'Learn SQL';
        document.getElementById('learnBody').innerHTML = `
          <div class="learn-section">
            <p>📖 Learn about <strong>${category}</strong> as you practice. Each exercise includes a mini-lesson to help you understand the concept.</p>
            <p style="margin-top: 8px;">💡 Tip: Check the hint for help if you get stuck!</p>
          </div>
        `;
      }
    }

        function loadExercise(index) {
      currentIndex = ((index % EXERCISES.length) + EXERCISES.length) % EXERCISES.length;
      const ex = EXERCISES[currentIndex];
      
      // Safety checks for elements
      const metaEl = document.getElementById('exMeta');
      const titleEl = document.getElementById('exTitle');
      const questionEl = document.getElementById('exQuestion');
      const inputEl = document.getElementById('sqlInput');
      const hintBoxEl = document.getElementById('hintBox');
      const resultBoxEl = document.getElementById('resultBox');
      
      if (metaEl) metaEl.textContent = `${ex.category} · Exercise ${ex.id} of ${EXERCISES.length} · dataset: ${ex.dataset}`;
      if (titleEl) titleEl.textContent = `Exercise #${ex.id}`;
      if (questionEl) questionEl.textContent = ex.question;
      if (inputEl) inputEl.value = '';
      if (hintBoxEl) {
        hintBoxEl.textContent = ex.hint;
        hintBoxEl.classList.add('hidden');
      }
      if (resultBoxEl) resultBoxEl.innerHTML = '';
      
      // Show the dataset
      showDataset(ex.dataset);
      
      // Update sidebar active state
      document.querySelectorAll('.cat-group li button').forEach(b => b.classList.toggle('active', +b.dataset.id === ex.id));
      
      // Update progress
      updateProgressLine();

      // Update Learn Panel
      updateLearnPanel(ex.category);
    }

    function updateProgressLine() {
      document.getElementById('progressLine').textContent = `Exercise ${currentIndex + 1} of ${EXERCISES.length}`;
      document.getElementById('progressTag').textContent = `${attemptedCount} / ${EXERCISES.length} exercises attempted`;
    }

    document.getElementById('runBtn').onclick = () => {
      const ex = EXERCISES[currentIndex];
      const query = document.getElementById('sqlInput').value.trim();
      const resultBox = document.getElementById('resultBox');
      if (!query) {
        resultBox.innerHTML = '<div class="status bad">⚠️ Please type a SQL query before running.</div>';
        return;
      }
      if (!ex.attempted) { ex.attempted = true;
        attemptedCount++;
        updateProgressLine(); }
      const q = query.toLowerCase();
      const passed = ex.keywords.every(k => q.includes(k));
      const rows = ex.getResult();
      let html = '';
      if (passed) {
        html +=
          `<div class="status good">✅ Looks good! Your query includes the expected SQL elements. Simulated result:</div>`;
      } else {
        const missing = ex.keywords.filter(k => !q.includes(k));
        html +=
          `<div class="status bad">⚠️ Your query may be missing: ${missing.join(', ')}. Check the hint. Here's the expected result for reference:</div>`;
      }
      html += renderTable(rows);
      resultBox.innerHTML = html;
    };

    document.getElementById('hintBtn').onclick = () => {
      document.getElementById('hintBox').classList.toggle('hidden');
    };

    document.getElementById('prevBtn').onclick = () => loadExercise(currentIndex - 1);
    document.getElementById('nextBtn').onclick = () => loadExercise(currentIndex + 1);

    /* ============================== INIT ============================== */
    renderSidebar();
    renderDatasetTabs();
    loadExercise(0);
  </script>

</body>

</html>
